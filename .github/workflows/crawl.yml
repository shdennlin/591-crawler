name: 591 Rental Crawler

# ┌─────────────────────────────────────────────────────────────────┐
# │  SCHEDULE CONFIGURATION                                         │
# │                                                                 │
# │  To change schedule times:                                      │
# │  1. Edit the desired times below (in your local timezone)       │
# │  2. Convert to UTC: subtract 8 hours for UTC+8 (Taiwan)         │
# │  3. Update the cron expressions                                 │
# │                                                                 │
# │  Current: 06,09,12,16,20,23 (UTC+8 Taiwan) — 6x daily           │
# │  Cron format: 'minute hour * * *' (runs daily)                  │
# │                                                                 │
# │  Branch behavior:                                                │
# │  - main: Scheduled runs (6x daily) + manual trigger             │
# │  - develop: Manual trigger only (for testing)                   │
# └─────────────────────────────────────────────────────────────────┘
on:
  # Schedule moved to a homelab cron that triggers workflow_dispatch via the
  # GitHub API. GitHub's own scheduler was delaying runs up to ~1.5h at the top
  # of the hour; the homelab cron fires on time. To restore GitHub scheduling,
  # uncomment the cron lines below.
  # schedule:
  #   # Local Time (UTC+8)  →  UTC Time  →  Cron
  #   # ─────────────────────────────────────────
  #   - cron: '0 22 * * *'   # 06:00 UTC+8 → 22:00 UTC
  #   - cron: '0 1 * * *'    # 09:00 UTC+8 → 01:00 UTC
  #   - cron: '0 4 * * *'    # 12:00 UTC+8 → 04:00 UTC
  #   - cron: '0 8 * * *'    # 16:00 UTC+8 → 08:00 UTC
  #   - cron: '0 12 * * *'   # 20:00 UTC+8 → 12:00 UTC
  #   - cron: '0 15 * * *'   # 23:00 UTC+8 → 15:00 UTC
  workflow_dispatch:  # Allow manual trigger on any branch (homelab cron uses this)

jobs:
  crawl:
    runs-on: [self-hosted, pve-homelab]
    # Each URL may be retried up to 3x with a 45s delay; 30 min gives enough
    # headroom when 591 is slow (repeated page timeouts compound across
    # 3 sheets × a few URLs × worst-case retries plus setup).
    timeout-minutes: 30
    # Schedule runs only on main branch; manual dispatch works on any branch
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      # ─────────────────────────────────────────────────────────────────
      # MULTIPLE SHEETS SUPPORT
      # ─────────────────────────────────────────────────────────────────
      # To add more sheets, simply add secrets with GOOGLE_SHEETS_ID_<NAME> pattern:
      #   - GOOGLE_SHEETS_ID (default)
      #   - GOOGLE_SHEETS_ID_WORK
      #   - GOOGLE_SHEETS_ID_PERSONAL
      # No workflow file changes needed - secrets are auto-discovered!
      # ─────────────────────────────────────────────────────────────────

      - name: Load Google Sheets configuration
        run: |
          # Auto-discover all GOOGLE_SHEETS_ID* secrets and export as env vars
          echo '${{ toJson(secrets) }}' | jq -r '
            to_entries
            | .[]
            | select(.key | startswith("GOOGLE_SHEETS_ID"))
            | "\(.key)<<EOF\n\(.value)\nEOF"
          ' >> $GITHUB_ENV
        shell: bash

      # Run under xvfb so Chromium launches headful (no headless bot signal).
      # xvfb is preinstalled on the self-hosted runner (lxc-130).
      - name: Run crawler
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" bun run crawl
